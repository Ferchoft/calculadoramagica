<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora Mágica</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --bg-black: #000; --gray-dark: #333; --orange: #FF9F0A; }
        body { background: var(--bg-black); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; overflow: hidden; }
        #video-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #status-dot { position: absolute; top: 20px; left: 20px; width: 10px; height: 10px; border-radius: 50%; background: #222; z-index: 100; transition: 0.3s; }
        .calculator { width: 100%; max-width: 400px; padding: 20px; }
        .display { font-size: 5rem; text-align: right; margin-bottom: 20px; font-weight: 300; min-height: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { aspect-ratio: 1; border-radius: 50%; border: none; font-size: 1.5rem; background: var(--gray-dark); color: #fff; cursor: pointer; }
        .btn-orange { background: var(--orange); }
        .btn-zero { grid-column: span 2; aspect-ratio: auto; border-radius: 50px; text-align: left; padding-left: 30px; }
        .flash { animation: flash-anim 0.5s; }
        @keyframes flash-anim { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body onclick="init()">

    <video id="video-input"></video>
    <div id="status-dot"></div>

    <div class="calculator">
        <div class="display" id="screen">0</div>
        <div class="grid">
            <button class="btn" style="background:#a5a5a5;color:#000">AC</button>
            <button class="btn" style="background:#a5a5a5;color:#000">+/-</button>
            <button class="btn" style="background:#a5a5a5;color:#000">%</button>
            <button class="btn btn-orange">÷</button>
            <button class="btn">7</button><button class="btn">8</button><button class="btn">9</button><button class="btn btn-orange">×</button>
            <button class="btn">4</button><button class="btn">5</button><button class="btn">6</button><button class="btn btn-orange">−</button>
            <button class="btn">1</button><button class="btn">2</button><button class="btn">3</button><button class="btn btn-orange">+</button>
            <button class="btn btn-zero">0</button><button class="btn">,</button><button class="btn btn-orange">=</button>
        </div>
    </div>

    <script>
        let detectedName = "";
        let isStarted = false;
        let lastState = "closed";

        // VOZ
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Speech ? new Speech() : null;
        if (rec) {
            rec.lang = 'es-ES';
            rec.continuous = true;
            rec.interimResults = true;
            rec.onresult = (e) => {
                let current = Array.from(e.results).map(r => r[0].transcript).join(" ").toLowerCase();
                if (current.includes("te llamas")) {
                    let parts = current.split("te llamas");
                    detectedName = parts[parts.length - 1].trim().toUpperCase();
                    document.getElementById('status-dot').style.background = "#FF9F0A"; // Naranja: ¡Nombre listo!
                }
            };
        }

        function init() {
            if (isStarted) return;
            isStarted = true;
            if (rec) rec.start();
            document.getElementById('status-dot').style.background = "red"; // Rojo: Escuchando
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // MANOS
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const l = res.multiHandLandmarks[0];
                const open = l[8].y < l[6].y && l[12].y < l[10].y;
                if (open && lastState === "closed") {
                    reveal(true); lastState = "open";
                } else if (!open && lastState === "open") {
                    reveal(false); lastState = "closed";
                }
            }
        });

        const cam = new Camera(document.getElementById('video-input'), {
            onFrame: async () => { await hands.send({image: document.getElementById('video-input')}); },
            width: 640, height: 480
        });
        cam.start();

        function reveal(show) {
            const s = document.getElementById('screen');
            if (show) {
                s.innerText = detectedName || "123.456.789";
                s.classList.add('flash');
                setTimeout(() => s.classList.remove('flash'), 500);
            } else {
                s.innerText = "0";
            }
        }
    </script>
</body>
</html>
